services:
  baikal:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: baikal-bot
    restart: unless-stopped

    # Pass environment variables at runtime
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:?DEEPSEEK_API_KEY is required}
      - NODE_ENV=${NODE_ENV:-production}

    # Shared volumes: host and container see the same files in real time
    volumes:
      # Tools and skills — add/edit on the host, the bot picks them up via /reload
      - ./tools:/app/tools
      - ./skills:/app/skills
      # Memory — long-term facts persisted to the host
      - ./memory:/app/memory
      # Data — user-generated content (e.g. downloaded spreadsheets)
      - ./data:/app/data

